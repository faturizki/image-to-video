name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Debug environment
      run: |
        python -c "import os; print('HF exists:', 'HUGGINGFACE_API_KEY' in os.environ); print('OPENAI exists:', 'OPENAI_API_KEY' in os.environ); print('GEMINI exists:', 'GEMINI_API_KEY' in os.environ)"

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r ../requirements.txt

    - name: Run tests
      run: |
        cd backend
        python -c "import config; print('Config loaded successfully')"

    - name: Validate API keys
      run: |
        cd backend
        python test_api_keys.py
      continue-on-error: true

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r ../requirements.txt

    - name: Build backend
      run: |
        cd backend
        python -c "from config import settings; print('API keys loaded:', bool(settings.huggingface_api_key), bool(settings.openai_api_key), bool(settings.gemini_api_key))"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Build frontend
      run: |
        cd frontend
        npm run build

    # Add deployment steps here if needed (e.g., to Vercel, Hugging Face Spaces)